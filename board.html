<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노무 리서치 답변 게시판</title>
<script src="config.js"></script>
<style>
  :root{ --line:#e3e3e3; --ink:#1a1a1a; --sub:#666; --brand:#2b5c8a; --bg:#f7f8fa; }
  *{ box-sizing:border-box; }
  body{ font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif; margin:0; background:var(--bg); color:var(--ink); line-height:1.6; }
  .wrap{ max-width:820px; margin:0 auto; padding:24px 18px 60px; }
  header{ display:flex; align-items:center; justify-content:space-between; padding:14px 0 20px; border-bottom:2px solid var(--brand); }
  header h1{ font-size:20px; margin:0; color:var(--brand); }
  header a{ font-size:14px; color:var(--sub); text-decoration:none; }
  header a:hover{ color:var(--brand); text-decoration:underline; }
  .search{ margin:20px 0; }
  .search input{ width:100%; padding:11px 14px; border:1px solid #ccc; border-radius:8px; font-size:15px; }
  table{ width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  th,td{ text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); font-size:14px; }
  th{ background:#f0f3f7; color:var(--sub); font-weight:600; font-size:12.5px; }
  tr:last-child td{ border-bottom:0; }
  .tk{ font-family:monospace; color:var(--brand); font-weight:600; }
  .st{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:12px; font-weight:600; }
  .st.done{ background:#eaf6ee; color:#1e6b3a; }
  .st.proc{ background:#fff5e6; color:#a86a10; }
  .st.recv{ background:#eef1f4; color:#5a6b7a; }
  .st.err{ background:#fdeceb; color:#a5342c; }
  td a.view{ color:var(--brand); font-weight:600; text-decoration:none; }
  td a.view:hover{ text-decoration:underline; }
  .empty{ text-align:center; color:var(--sub); padding:40px; background:#fff; border:1px dashed var(--line); border-radius:12px; }
  .q{ color:var(--ink); }
  .meta{ color:var(--sub); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="org">답변 게시판</h1>
    <a href="index.html">← 새 질의 접수</a>
  </header>

  <div class="search">
    <input type="text" id="q" placeholder="🔍 접수번호 / 이름 / 질문 내용으로 검색">
  </div>

  <div id="list"></div>
</div>

<script>
  var cfg = window.PORTAL_CONFIG || {};
  if (cfg.ORG_NAME) document.getElementById('org').textContent = cfg.ORG_NAME + ' — 답변 게시판';
  var all = [];

  var STATUS = {
    'done':   ['done','✅ 완료'],
    'proc':   ['proc','⏳ 처리중'],
    'recv':   ['recv','📥 접수'],
    'error':  ['err','⚠ 오류']
  };

  function render(items){
    var box = document.getElementById('list');
    if (!items.length){ box.innerHTML = '<div class="empty">표시할 항목이 없습니다.</div>'; return; }
    var rows = items.map(function(it){
      var s = STATUS[it.status] || STATUS['recv'];
      var link = (it.status==='done' && it.answer_url)
        ? '<a class="view" href="'+it.answer_url+'" target="_blank">답변 보기 →</a>'
        : '<span class="meta">—</span>';
      var qshort = (it.question||'').length>50 ? (it.question||'').slice(0,50)+'…' : (it.question||'');
      return '<tr>'
        + '<td><span class="tk">'+it.id+'</span></td>'
        + '<td class="q">'+escapeHtml(qshort)+'<div class="meta">'+escapeHtml(it.name||'')+(it.dept?' · '+escapeHtml(it.dept):'')+' · '+(it.date||'')+'</div></td>'
        + '<td><span class="st '+s[0]+'">'+s[1]+'</span></td>'
        + '<td>'+link+'</td>'
        + '</tr>';
    }).join('');
    box.innerHTML = '<table><thead><tr><th>접수번호</th><th>질문</th><th>상태</th><th>답변</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  document.getElementById('q').addEventListener('input', function(e){
    var t = e.target.value.trim().toLowerCase();
    if (!t){ render(all); return; }
    render(all.filter(function(it){
      return (it.id+' '+(it.name||'')+' '+(it.question||'')).toLowerCase().indexOf(t) >= 0;
    }));
  });

  fetch((cfg.ANSWERS_INDEX||'answers/index.json') + '?t=' + Date.now())
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(data){
      all = (data.items || data || []).sort(function(a,b){ return (b.ts||0)-(a.ts||0); });
      render(all);
    })
    .catch(function(){ document.getElementById('list').innerHTML = '<div class="empty">아직 발행된 답변 목록이 없습니다.</div>'; });
</script>
</body>
</html>
