<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노무 리서치 질의 접수</title>
<script src="config.js"></script>
<style>
  :root{ --line:#e3e3e3; --ink:#1a1a1a; --sub:#666; --brand:#2b5c8a; --bg:#f7f8fa; }
  *{ box-sizing:border-box; }
  body{ font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif; margin:0; background:var(--bg); color:var(--ink); line-height:1.6; }
  .wrap{ max-width:680px; margin:0 auto; padding:24px 18px 60px; }
  header{ display:flex; align-items:center; justify-content:space-between; padding:14px 0 20px; border-bottom:2px solid var(--brand); }
  header h1{ font-size:20px; margin:0; color:var(--brand); }
  header a{ font-size:14px; color:var(--sub); text-decoration:none; }
  header a:hover{ color:var(--brand); text-decoration:underline; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:22px; margin-top:20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  label{ display:block; font-weight:600; font-size:14px; margin:16px 0 6px; }
  label .req{ color:#c0392b; }
  .hint{ font-weight:400; color:var(--sub); font-size:12.5px; margin-left:4px; }
  input[type=text], textarea, select{ width:100%; padding:11px 12px; border:1px solid #ccc; border-radius:8px; font-size:15px; font-family:inherit; background:#fff; }
  textarea{ min-height:150px; resize:vertical; }
  input:focus, textarea:focus, select:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(43,92,138,.12); }
  .row{ display:flex; gap:12px; }
  .row > div{ flex:1; }
  .depth{ display:grid; grid-template-columns:1fr; gap:10px; margin-top:6px; }
  .depth label{ display:flex; gap:10px; align-items:flex-start; margin:0; padding:12px 14px; border:1px solid #ccc; border-radius:8px; cursor:pointer; font-weight:400; }
  .depth label:hover{ border-color:var(--brand); background:#fafcff; }
  .depth input{ margin-top:3px; }
  .depth b{ display:block; font-size:14.5px; }
  .depth span{ display:block; color:var(--sub); font-size:12.5px; }
  .depth input:checked + div b{ color:var(--brand); }
  button{ margin-top:24px; width:100%; padding:14px; background:var(--brand); color:#fff; border:0; border-radius:9px; font-size:16px; font-weight:600; cursor:pointer; }
  button:hover{ background:#234d76; }
  button:disabled{ background:#9bb4c9; cursor:default; }
  .msg{ margin-top:16px; padding:14px 16px; border-radius:9px; font-size:14.5px; display:none; }
  .msg.ok{ display:block; background:#eaf6ee; border:1px solid #b7dfc4; color:#1e6b3a; }
  .msg.err{ display:block; background:#fdeceb; border:1px solid #f3c2be; color:#a5342c; }
  .ticket{ font-family:monospace; font-weight:700; font-size:16px; }
  footer{ text-align:center; color:#aaa; font-size:12px; margin-top:30px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="org">노무 리서치 포털</h1>
    <a href="board.html">📋 답변 게시판 →</a>
  </header>

  <div class="card">
    <p style="margin:0 0 6px; color:var(--sub); font-size:14px;">
      노무 관련 궁금한 점을 입력하면 리서치를 돌려 근거 있는 답변을 드립니다.
      답변은 <b>답변 게시판</b>에서 접수번호로 확인하세요.
    </p>

    <form id="form">
      <div class="row">
        <div>
          <label>이름 <span class="req">*</span></label>
          <input type="text" id="name" required autocomplete="off" placeholder="예) 홍길동">
        </div>
        <div>
          <label>부서 <span class="hint">(선택)</span></label>
          <input type="text" id="dept" autocomplete="off" placeholder="예) 인사팀">
        </div>
      </div>

      <label>질문 <span class="req">*</span> <span class="hint">배경·상황을 구체적으로 적을수록 정확합니다</span></label>
      <textarea id="question" required placeholder="예) 수습기간 3개월 직원을 해고하려는데 해고예고수당을 줘야 하나요? 입사일·근로계약 형태 등 상황을 함께 적어주세요."></textarea>

      <label>답변 깊이 <span class="req">*</span></label>
      <div class="depth">
        <label>
          <input type="radio" name="depth" value="full">
          <div><b>풀 검증 (가장 정확 · 오래 걸림)</b><span>법제처 원문 + 반대결론 변론 + 인용 재검증까지. 중요·민감 사안 권장</span></div>
        </label>
        <label>
          <input type="radio" name="depth" value="standard" checked>
          <div><b>표준 (권장)</b><span>법제처 원문 검증 + 결론 + 인용검증 1회. 대부분의 질문에 적합</span></div>
        </label>
        <label>
          <input type="radio" name="depth" value="quick">
          <div><b>빠른 초안</b><span>핵심 조문·해석 위주로 신속 답변. 방향만 빠르게 볼 때</span></div>
        </label>
      </div>

      <label>팀 접속코드 <span class="req">*</span> <span class="hint">회사에서 공유받은 코드 (외부인 차단용)</span></label>
      <input type="password" id="accessCode" autocomplete="off" placeholder="예) 회사에서 알려준 코드">

      <button type="submit" id="submitBtn">질의 제출</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <footer>제출된 내용은 담당자가 검토 후 답변합니다.</footer>
</div>

<script>
  var cfg = window.PORTAL_CONFIG || {};
  if (cfg.ORG_NAME) document.getElementById('org').textContent = cfg.ORG_NAME;

  var form = document.getElementById('form');
  var msg = document.getElementById('msg');
  var btn = document.getElementById('submitBtn');

  function show(type, html){ msg.className = 'msg ' + type; msg.innerHTML = html; }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var payload = {
      name: document.getElementById('name').value.trim(),
      dept: document.getElementById('dept').value.trim(),
      question: document.getElementById('question').value.trim(),
      depth: (document.querySelector('input[name=depth]:checked')||{}).value || 'standard',
      accessCode: document.getElementById('accessCode').value.trim()
    };
    if (!payload.name || !payload.question){ show('err','이름과 질문을 입력해 주세요.'); return; }
    if (!payload.accessCode){ show('err','팀 접속코드를 입력해 주세요.'); return; }
    if (!cfg.APPS_SCRIPT_URL || cfg.APPS_SCRIPT_URL.indexOf('http') !== 0){
      show('err','⚙️ 아직 서버(Apps Script) 주소가 설정되지 않았습니다. 관리자에게 config.js 설정을 요청하세요.'); return;
    }

    btn.disabled = true; btn.textContent = '제출 중...';
    // Apps Script는 CORS 프리플라이트를 피하기 위해 text/plain 으로 전송
    fetch(cfg.APPS_SCRIPT_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (res && res.ok){
        form.reset();
        show('ok','✅ 접수되었습니다. 접수번호: <span class="ticket">'+res.id+'</span><br>'
          + '답변이 완료되면 <a href="board.html">답변 게시판</a>에서 이 번호로 확인하세요.');
      } else {
        show('err','제출에 실패했습니다: ' + (res && res.error ? res.error : '알 수 없는 오류'));
      }
    })
    .catch(function(err){ show('err','네트워크 오류: ' + err.message); })
    .finally(function(){ btn.disabled = false; btn.textContent = '질의 제출'; });
  });
</script>
</body>
</html>
